# Reverse proxy for the production build (adapter-node).
# Run the app with (see README — these env vars are required behind TLS so
# cookies get `Secure` and form POSTs pass SvelteKit's CSRF check):
#   ORIGIN=https://your-domain PROTOCOL_HEADER=x-forwarded-proto \
#   HOST_HEADER=x-forwarded-host HOST=127.0.0.1 PORT=3000 node build
# Then point nginx at it. This is for the LATER web deployment — not needed
# for localhost dev (use `npm run dev` instead).

server {
	listen 80;
	server_name your-domain.example;   # change me

	location / {
		proxy_pass http://127.0.0.1:3000;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Forwarded-Host $host;
	}
}
